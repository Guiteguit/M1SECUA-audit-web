version: "3.8"
services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    ports:
      - "8081:80"
    restart: unless-stopped
  osint-docs:
    image: nginx:alpine
    container_name: osint-docs
    ports:
      - "8082:80"
    volumes:
      - ./osint-public:/usr/share/nginx/html:ro
    restart: unless-stopped
