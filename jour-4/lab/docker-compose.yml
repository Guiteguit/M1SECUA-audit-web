version: "3.8"

services:
  sonarqube:
    image: sonarqube:community
    container_name: j4-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    restart: unless-stopped

  python-app:
    build: ./sample-python-app
    container_name: j4-python-app
    ports:
      - "5002:5002"
    restart: unless-stopped

  js-app:
    build: ./sample-js-app
    container_name: j4-js-app
    ports:
      - "3002:3002"
    restart: unless-stopped
